name: Update M3U8 Playlist

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Protected Playlist Generator
        env:
          SECURE_DECRYPT_CODE: ${{ secrets.SECURE_DECRYPT_CODE }}
        run: python main.py

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add playlist.m3u
          # The || exit 0 prevents the workflow from failing if the playlist hasn't changed
          git commit -m "Automated API playlist update" || exit 0
          git push origin HEAD
